<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcus Keil</title>
  <link rel="stylesheet" href="shared/style.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="shared/nav.js"></script>

  <style>
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "name": "Marcus Keil",
  "role": "Research Software Engineer",
  "degree": "PhD Astrochemistry, University College London",
  "bio": "I build research software at the intersection of neuroscience and machine learning. My work spans neural data pipelines, computational modeling, and open-source tooling for the scientific community. Previously I worked on [past role \/ project] where I [accomplishment or focus area].",
  "github": "https:\/\/github.com\/Marcus-Keil",
  "slideshowInterval": 4000
}/*EDITMODE-END*/;

// Fallback photos used if manifest.json hasn't loaded yet or fetch fails
const FALLBACK_PHOTOS = [
  { id: 1, src: "https://picsum.photos/seed/mk1/1200/800" },
  { id: 2, src: "https://picsum.photos/seed/mk4/1200/800" },
  { id: 3, src: "https://picsum.photos/seed/mk7/1200/800" },
];

// Load photos from photos/manifest.json — each entry: { file, title?, description? }
function usePhotos() {
  const [photos, setPhotos] = useState(FALLBACK_PHOTOS);
  useEffect(() => {
    fetch('photos/manifest.json')
      .then(r => r.json())
      .then(manifest => {
        const loaded = manifest.map((entry, i) => ({
          id: i + 1,
          src: `photos/img/${entry.file}`,
          title: entry.title || null,
          description: entry.description || null,
        }));
        if (loaded.length > 0) setPhotos(loaded);
      })
      .catch(() => { /* keep fallback */ });
  }, []);
  return photos;
}

function useTweaks() {
  const [tweaks, setTweaks] = useState(() => {
    try {
      const saved = localStorage.getItem('mk_tweaks');
      return saved ? { ...TWEAK_DEFAULTS, ...JSON.parse(saved) } : TWEAK_DEFAULTS;
    } catch { return TWEAK_DEFAULTS; }
  });
  const update = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    localStorage.setItem('mk_tweaks', JSON.stringify(next));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };
  return [tweaks, update];
}

function Slideshow({ photos, interval, onClickGallery }) {
  const FADE_MS = 1500;
  const [baseIdx, setBaseIdx] = useState(0);      // always fully visible underneath
  const [topIdx, setTopIdx] = useState(null);      // incoming image, fades in on top
  const [topVisible, setTopVisible] = useState(false);
  const timerRef = useRef(null);
  const transitioning = useRef(false);

  const goTo = useCallback((idx) => {
    if (transitioning.current || idx === baseIdx) return;
    transitioning.current = true;
    setTopIdx(idx);
    setTopVisible(false);
    // Two rAFs ensure the browser has painted topIdx at opacity:0 before starting transition
    requestAnimationFrame(() => requestAnimationFrame(() => {
      setTopVisible(true);
      setTimeout(() => {
        setBaseIdx(idx);
        setTopIdx(null);
        setTopVisible(false);
        transitioning.current = false;
      }, FADE_MS);
    }));
  }, [baseIdx]);

  useEffect(() => {
    timerRef.current = setInterval(() => {
      goTo((baseIdx + 1) % photos.length);
    }, interval);
    return () => clearInterval(timerRef.current);
  }, [baseIdx, interval, goTo, photos.length]);

  const manualGo = (idx) => {
    clearInterval(timerRef.current);
    goTo(idx);
  };

  const current = topIdx !== null ? topIdx : baseIdx;

  return (
    <div style={{ position: 'relative', width: '100%', height: '100%', cursor: 'pointer' }}
         onClick={onClickGallery}>
      {/* Base layer — always fully visible */}
      <div style={{
        position: 'absolute', inset: 0, zIndex: 1,
        backgroundImage: `url(${photos[baseIdx].src})`,
        backgroundSize: 'cover', backgroundPosition: 'center',
      }} />
      {/* Top layer — fades in over base */}
      {topIdx !== null && (
        <div style={{
          position: 'absolute', inset: 0, zIndex: 2,
          backgroundImage: `url(${photos[topIdx].src})`,
          backgroundSize: 'cover', backgroundPosition: 'center',
          opacity: topVisible ? 1 : 0,
          transition: `opacity ${FADE_MS}ms ease`,
        }} />
      )}
      {/* Gradient overlay bottom */}
      <div style={{
        position: 'absolute', inset: 0, zIndex: 3,
        background: 'linear-gradient(to top, rgba(20,18,16,0.7) 0%, transparent 45%)',
        pointerEvents: 'none',
      }} />
      {/* Hint label */}
      <div style={{
        position: 'absolute', bottom: 32, left: '50%', transform: 'translateX(-50%)',
        zIndex: 4, color: 'rgba(255,255,255,0.5)',
        fontFamily: 'var(--font-body)', fontSize: 11, letterSpacing: '0.15em',
        textTransform: 'uppercase', pointerEvents: 'none',
        whiteSpace: 'nowrap',
      }}>click to browse gallery</div>
      {/* Dots */}
      <div style={{
        position: 'absolute', bottom: 16, left: '50%', transform: 'translateX(-50%)',
        zIndex: 5, display: 'flex', gap: 6, pointerEvents: 'all',
      }} onClick={e => e.stopPropagation()}>
        {photos.map((_, i) => (
          <button key={i} onClick={() => manualGo(i)} style={{
            width: i === current ? 20 : 6, height: 6,
            borderRadius: 3, border: 'none', cursor: 'pointer',
            background: i === current ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.35)',
            transition: 'all 0.3s ease', padding: 0,
          }} />
        ))}
      </div>
    </div>
  );
}

function GalleryModal({ photos, startIdx, onClose }) {
  const [idx, setIdx] = useState(startIdx);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight') setIdx(i => (i + 1) % photos.length);
      if (e.key === 'ArrowLeft') setIdx(i => (i - 1 + photos.length) % photos.length);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [photos.length, onClose]);

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 100,
      background: 'rgba(10,9,8,0.96)',
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      animation: 'fadeIn 0.25s ease',
    }}>
      {/* Close */}
      <button onClick={onClose} style={{
        position: 'absolute', top: 24, right: 28,
        background: 'none', border: 'none', color: 'rgba(255,255,255,0.6)',
        fontFamily: 'var(--font-body)', fontSize: 13, letterSpacing: '0.1em',
        textTransform: 'uppercase', cursor: 'pointer',
      }}>close ✕</button>

      {/* Counter */}
      <div style={{
        position: 'absolute', top: 28, left: 28,
        fontFamily: 'var(--font-body)', fontSize: 12, letterSpacing: '0.12em',
        color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase',
      }}>{idx + 1} / {photos.length}</div>

      {/* Image */}
      <div style={{ position: 'relative', maxWidth: '85vw', maxHeight: '72vh' }}>
        <img src={photos[idx].src} style={{
          maxWidth: '85vw', maxHeight: '70vh',
          objectFit: 'contain', display: 'block',
        }} alt={photos[idx].title || ''} />
        {/* Title + description overlay */}
        {(photos[idx].title || photos[idx].description) && (
          <div style={{
            marginTop: 14, textAlign: 'center',
          }}>
            {photos[idx].title && (
              <div style={{
                fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 300,
                fontSize: '1.1rem', color: 'rgba(255,255,255,0.85)', marginBottom: 4,
              }}>{photos[idx].title}</div>
            )}
            {photos[idx].description && (
              <div style={{
                fontFamily: 'var(--font-body)', fontWeight: 300,
                fontSize: 12, color: 'rgba(255,255,255,0.45)', letterSpacing: '0.04em',
              }}>{photos[idx].description}</div>
            )}
          </div>
        )}
      </div>

      {/* Nav arrows */}
      {photos.length > 1 && <>
        <button onClick={() => setIdx(i => (i - 1 + photos.length) % photos.length)} style={{
          position: 'absolute', left: 20, top: '50%', transform: 'translateY(-50%)',
          background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.12)',
          color: '#fff', width: 44, height: 44, borderRadius: '50%',
          cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'background 0.2s',
        }}>‹</button>
        <button onClick={() => setIdx(i => (i + 1) % photos.length)} style={{
          position: 'absolute', right: 20, top: '50%', transform: 'translateY(-50%)',
          background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.12)',
          color: '#fff', width: 44, height: 44, borderRadius: '50%',
          cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'background 0.2s',
        }}>›</button>
      </>}

      {/* Thumbnails */}
      <div style={{
        position: 'absolute', bottom: 20,
        display: 'flex', gap: 8,
      }}>
        {photos.map((p, i) => (
          <div key={p.id} onClick={() => setIdx(i)} style={{
            width: 52, height: 36,
            backgroundImage: `url(${p.src})`,
            backgroundSize: 'cover', backgroundPosition: 'center',
            cursor: 'pointer', opacity: i === idx ? 1 : 0.4,
            outline: i === idx ? '2px solid rgba(255,255,255,0.7)' : 'none',
            outlineOffset: 2,
            transition: 'opacity 0.2s',
          }} />
        ))}
      </div>
    </div>
  );
}

function TweaksPanel({ tweaks, update, onClose }) {
  const fields = [
    { key: 'name', label: 'Name', type: 'text' },
    { key: 'role', label: 'Role / Title', type: 'text' },
    { key: 'degree', label: 'Degree', type: 'text' },
    { key: 'bio', label: 'Bio', type: 'textarea' },
    { key: 'github', label: 'GitHub URL', type: 'text' },
  ];

  const panelStyle = {
    position: 'fixed', bottom: 20, right: 20, zIndex: 200,
    width: 300, background: '#fff',
    border: '1px solid rgba(0,0,0,0.1)',
    boxShadow: '0 8px 40px rgba(0,0,0,0.12)',
    fontFamily: 'var(--font-body)', fontSize: 13,
    animation: 'fadeUp 0.2s ease',
    overflow: 'hidden',
  };
  const headerStyle = {
    background: '#1a1917', color: '#f5f2ee',
    padding: '10px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    fontFamily: 'var(--font-body)', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase',
  };
  const bodyStyle = { padding: 14, display: 'flex', flexDirection: 'column', gap: 10, maxHeight: '70vh', overflowY: 'auto' };
  const labelStyle = { display: 'block', fontSize: 10, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#888', marginBottom: 3 };
  const inputStyle = { width: '100%', border: '1px solid #ddd', padding: '6px 8px', fontFamily: 'var(--font-body)', fontSize: 13, color: '#1a1917', background: '#fafafa', resize: 'vertical' };

  return (
    <div style={panelStyle}>
      <div style={headerStyle}>
        Tweaks
        <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#f5f2ee', cursor: 'pointer', fontSize: 16, lineHeight: 1 }}>×</button>
      </div>
      <div style={bodyStyle}>
        {fields.map(f => (
          <label key={f.key}>
            <span style={labelStyle}>{f.label}</span>
            {f.type === 'textarea'
              ? <textarea rows={4} style={inputStyle} value={tweaks[f.key]} onChange={e => update(f.key, e.target.value)} />
              : <input type="text" style={inputStyle} value={tweaks[f.key]} onChange={e => update(f.key, e.target.value)} />
            }
          </label>
        ))}
        <div style={{ paddingTop: 4, borderTop: '1px solid #eee', fontSize: 11, color: '#aaa', lineHeight: 1.5 }}>
          To add your own photos, replace the image URLs in <code>PLACEHOLDER_PHOTOS</code> in the source HTML.
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, update] = useTweaks();
  const photos = usePhotos();
  const [photoHovered, setPhotoHovered] = useState(false);
  const [galleryOpen, setGalleryOpen] = useState(false);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    setTimeout(() => setLoaded(true), 80);

    // Tweaks integration
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  // Default: slant further right. Hover: expands left more dramatically.
  const diagTop = photoHovered ? 34 : 52;
  const diagBot = photoHovered ? 47 : 65;

  const leftClip = `polygon(0 0, ${diagTop}% 0, ${diagBot}% 100%, 0 100%)`;
  const rightClip = `polygon(${diagTop}% 0, 100% 0, 100% 100%, ${diagBot}% 100%)`;

  const panelTransition = 'clip-path 0.85s cubic-bezier(0.25, 0.46, 0.45, 0.94)';

  return (
    <div style={{ width: '100vw', height: '100vh', position: 'relative', overflow: 'hidden', fontFamily: 'var(--font-body)' }}>
      <SiteNav current="home" />

      {/* LEFT PANEL — Info */}
      <div style={{
        position: 'absolute', inset: 0,
        background: 'var(--bg-left)',
        clipPath: leftClip,
        transition: panelTransition,
        zIndex: 1,
      }}>
        <div style={{
          position: 'absolute', top: 0, left: 0,
          width: '50vw', height: '100%',
          display: 'flex', flexDirection: 'column', justifyContent: 'center',
          padding: '0 10vw 0 6vw',
          opacity: loaded ? 1 : 0,
          transform: loaded ? 'none' : 'translateY(12px)',
          transition: 'opacity 0.7s ease 0.1s, transform 0.7s ease 0.1s',
        }}>
          {/* Name */}
          <div style={{
            fontFamily: 'var(--font-display)', fontWeight: 300, fontSize: 'clamp(2.2rem, 3.5vw, 4rem)',
            color: 'var(--text-primary)', lineHeight: 1.05, letterSpacing: '-0.01em',
            marginBottom: '0.25em',
          }}>
            Marcus Keil
          </div>

          {/* Rule */}
          <div style={{ width: 36, height: 1.5, background: 'var(--accent)', margin: '1.2em 0 1.4em' }} />

          {/* Role */}
          <div style={{
            fontFamily: 'var(--font-body)', fontWeight: 400, fontSize: 'clamp(0.75rem, 1.1vw, 1rem)',
            color: 'var(--text-secondary)', letterSpacing: '0.12em', textTransform: 'uppercase',
            marginBottom: '0.5em',
          }}>
          <p>Research Software Engineer</p>
          <p>University College London CS Department</p>
          </div>

          {/* Degree */}
          <div style={{
            fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 300,
            fontSize: 'clamp(0.9rem, 1.3vw, 1.2rem)',
            color: 'var(--text-secondary)', marginBottom: '2em',
          }}>
          PhD Astrochemistry, University College London
          </div>

          {/* Bio */}
          <div style={{
            fontFamily: 'var(--font-body)', fontWeight: 300,
            fontSize: 'clamp(0.8rem, 1vw, 0.95rem)',
            color: 'var(--text-primary)', lineHeight: 1.75,
            maxWidth: '42ch',
            opacity: 0.8,
            textAlign: 'justify'
          }}>
          <p>
            My focus is on scientific workflow performance analysis, HPC benchmarking and the improvement of scientific
            code functionality and performance. Currently, I work for the UK Square-kilometre Regional Center to research
            hardware performance using scientific workflow micro-benchmarks, to best match users and hardware.
          </p>
          </div>
        </div>

        {/* Links pinned to bottom-left */}
        <div style={{
          position: 'absolute', bottom: '5vh', left: '6vw',
          display: 'flex', gap: 24, alignItems: 'center',
          opacity: loaded ? 1 : 0,
          transition: 'opacity 0.7s ease 0.5s',
        }}>
          <a href="https://github.com/Marcus-Keil" target="_blank" rel="noopener noreferrer" style={{
            display: 'inline-flex', alignItems: 'center', gap: 7,
            fontFamily: 'var(--font-body)', fontSize: 12, letterSpacing: '0.1em',
            textTransform: 'uppercase', color: 'var(--text-secondary)',
            textDecoration: 'none', transition: 'color 0.2s',
          }}
            onMouseEnter={e => e.currentTarget.style.color = 'var(--accent)'}
            onMouseLeave={e => e.currentTarget.style.color = 'var(--text-secondary)'}
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.37.6.1.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.55-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            GitHub
          </a>

          {/* CV download — place cv.pdf in repo root */}
          <a href="files/MarcusKeil_CV.pdf" download style={{
            display: 'inline-flex', alignItems: 'center', gap: 7,
            fontFamily: 'var(--font-body)', fontSize: 12, letterSpacing: '0.1em',
            textTransform: 'uppercase', color: 'var(--text-secondary)',
            textDecoration: 'none', transition: 'color 0.2s',
          }}
            onMouseEnter={e => e.currentTarget.style.color = 'var(--accent)'}
            onMouseLeave={e => e.currentTarget.style.color = 'var(--text-secondary)'}
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            CV
          </a>
        </div>
      </div>

      {/* RIGHT PANEL — Photos */}
      <div
        style={{
          position: 'absolute', inset: 0,
          clipPath: rightClip,
          transition: panelTransition,
          zIndex: 2,
          cursor: 'pointer',
        }}
        onMouseEnter={() => setPhotoHovered(true)}
        onMouseLeave={() => setPhotoHovered(false)}
      >
        <Slideshow
          photos={photos}
          interval={tweaks.slideshowInterval}
          onClickGallery={() => setGalleryOpen(true)}
        />
      </div>

      {/* Gallery Modal */}
      {galleryOpen && (
        <GalleryModal
          photos={photos}
          startIdx={0}
          onClose={() => setGalleryOpen(false)}
        />
      )}

      {/* Tweaks panel */}
      {tweaksVisible && (
        <TweaksPanel tweaks={tweaks} update={update} onClose={() => setTweaksVisible(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
